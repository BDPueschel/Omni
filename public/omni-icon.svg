<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sphere" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#8AB4FF"/>
      <stop offset="35%" stop-color="#5B8DEF"/>
      <stop offset="70%" stop-color="#3A5FBF"/>
      <stop offset="100%" stop-color="#1A2A5C"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#648CFF" stop-opacity="0"/>
      <stop offset="80%" stop-color="#648CFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#648CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="250" fill="url(#glow)"/>

  <!-- Main sphere -->
  <circle cx="256" cy="256" r="200" fill="url(#sphere)"/>

  <!-- Glass highlight -->
  <ellipse cx="210" cy="200" rx="80" ry="60" fill="url(#shine)"/>

  <!-- Subtle bottom rim -->
  <ellipse cx="256" cy="370" rx="120" ry="8" fill="#8AB4FF" opacity="0.08"/>
</svg>
