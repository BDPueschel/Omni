<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main sphere — more transparent, glass-like -->
    <radialGradient id="glass" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#A8CFFF" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#6FA3F0" stop-opacity="0.5"/>
      <stop offset="65%" stop-color="#3D6FC2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1B2D5E" stop-opacity="0.6"/>
    </radialGradient>

    <!-- Bright highlight — top-left shine -->
    <radialGradient id="shine" cx="32%" cy="28%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Secondary subtle highlight — bottom-right -->
    <radialGradient id="rimshine" cx="70%" cy="75%" r="20%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Edge ring glow -->
    <radialGradient id="edge" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="#5B8DEF" stop-opacity="0"/>
      <stop offset="90%" stop-color="#5B8DEF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3A5FBF" stop-opacity="0.1"/>
    </radialGradient>

    <!-- Outer ambient glow -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#648CFF" stop-opacity="0"/>
      <stop offset="90%" stop-color="#648CFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#648CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft ambient glow -->
  <circle cx="256" cy="256" r="252" fill="url(#ambient)"/>

  <!-- Edge ring -->
  <circle cx="256" cy="256" r="200" fill="url(#edge)"/>

  <!-- Glass sphere body -->
  <circle cx="256" cy="256" r="195" fill="url(#glass)"/>

  <!-- Primary highlight -->
  <ellipse cx="205" cy="195" rx="75" ry="55" fill="url(#shine)"/>

  <!-- Secondary rim highlight -->
  <ellipse cx="320" cy="330" rx="50" ry="40" fill="url(#rimshine)"/>

  <!-- Thin edge ring for definition -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#5B8DEF" stroke-width="1.5" stroke-opacity="0.25"/>
</svg>
