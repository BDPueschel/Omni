<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Glass sphere — transparent with deeper blue at edges -->
    <radialGradient id="glass" cx="42%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#B8D8FF" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#7AADF0" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#4478D0" stop-opacity="0.5"/>
      <stop offset="85%" stop-color="#1E3A7A" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#0E1E45" stop-opacity="0.75"/>
    </radialGradient>

    <!-- Top-left shine -->
    <radialGradient id="shine" cx="33%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle secondary reflection -->
    <radialGradient id="rim" cx="68%" cy="72%" r="18%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft outer glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="72%" stop-color="#5B8DEF" stop-opacity="0"/>
      <stop offset="88%" stop-color="#5B8DEF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3A5FBF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="248" fill="url(#glow)"/>

  <!-- Main glass sphere -->
  <circle cx="256" cy="256" r="192" fill="url(#glass)"/>

  <!-- Primary shine -->
  <ellipse cx="208" cy="198" rx="68" ry="48" fill="url(#shine)"/>

  <!-- Rim reflection -->
  <ellipse cx="315" cy="325" rx="42" ry="32" fill="url(#rim)"/>

  <!-- Thin definition ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#4A7ADF" stroke-width="1" stroke-opacity="0.2"/>
</svg>
