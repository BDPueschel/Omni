<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main sphere — more transparent, glass-like -->
    <radialGradient id="glass" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#A8CFFF" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#6FA3F0" stop-opacity="0.5"/>
      <stop offset="65%" stop-color="#3D6FC2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1B2D5E" stop-opacity="0.6"/>
    </radialGradient>

    <!-- Bright highlight — top-left shine -->
    <radialGradient id="shine" cx="32%" cy="28%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Secondary subtle highlight — bottom-right -->
    <radialGradient id="rimshine" cx="70%" cy="75%" r="20%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Edge ring glow — wider, more prominent -->
    <radialGradient id="edge" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#5B8DEF" stop-opacity="0"/>
      <stop offset="82%" stop-color="#5B8DEF" stop-opacity="0.25"/>
      <stop offset="95%" stop-color="#4A7ADF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3A5FBF" stop-opacity="0.1"/>
    </radialGradient>

    <!-- Outer ambient glow -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="50%">
      <stop offset="65%" stop-color="#648CFF" stop-opacity="0"/>
      <stop offset="85%" stop-color="#648CFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#648CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft ambient glow -->
  <circle cx="256" cy="256" r="252" fill="url(#ambient)"/>

  <!-- Edge ring — kept large for glass emphasis -->
  <circle cx="256" cy="256" r="200" fill="url(#edge)"/>

  <!-- Glass sphere body — smaller to show more of the glass edge -->
  <circle cx="256" cy="256" r="155" fill="url(#glass)"/>

  <!-- Primary highlight — scaled down with orb -->
  <ellipse cx="215" cy="210" rx="58" ry="42" fill="url(#shine)"/>

  <!-- Secondary rim highlight -->
  <ellipse cx="305" cy="310" rx="38" ry="28" fill="url(#rimshine)"/>

  <!-- Thin edge ring for definition on outer edge -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#5B8DEF" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Inner orb definition ring -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="#5B8DEF" stroke-width="1" stroke-opacity="0.15"/>
</svg>
